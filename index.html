<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧郊野公園垃圾桶</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* 模仿設計圖的點狀背景與字體 */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            text-align: center;
            background-color: #f5f0e6;
            background-image: radial-gradient(#d3cabc 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部深啡色大標題區塊 */
        .header-box {
            background-color: #634739;
            color: white;
            width: 800px;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: relative;
        }

        .header-box h1 {
            margin: 0 0 15px 0;
            font-size: 32px;
            letter-spacing: 2px;
        }

        /* 橘色 Micro:bit 按鈕 */
        #connectSerialBtn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 6px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #connectSerialBtn:hover { background-color: #d35400; }
        #connectSerialBtn:disabled { background-color: #95a5a6; cursor: not-allowed; }

        /* 主畫面佈局：左邊鏡頭區，右邊按鈕區 */
        .main-display {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 左側白色卡片 (包含鏡頭與開始按鈕) */
        .left-panel {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 鏡頭外框 (深啡色) */
        #camera-container {
            position: relative;
            display: inline-block;
            border: 10px solid #73574b;
            border-radius: 4px;
            overflow: hidden;
            background-color: #000;
            margin-bottom: 20px;
        }
        video { display: block; width: 640px; height: 480px; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 640px; height: 480px; pointer-events: none; }

        /* 深綠色開始辨認按鈕 */
        #toggleBtn {
            background-color: #347b38;
            color: white;
            border: none;
            padding: 15px 24px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        #toggleBtn:hover { background-color: #27632a; }
        #toggleBtn.stop { background-color: #c0392b; }
        #toggleBtn.stop:hover { background-color: #e74c3c; }

        /* 右側按鈕與狀態面板 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 260px;
        }

        /* 灰藍色 QR Code 狀態列 */
        .qr-status {
            background-color: #d8e1e8;
            padding: 20px 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            border: 2px solid #bdc3c7;
            transition: all 0.3s ease;
            text-align: center;
        }
        .qr-status.detected {
            background-color: #e8f8f5;
            color: #27ae60;
            border-color: #2ecc71;
        }

        /* 右側功能按鈕通用樣式 */
        .side-btn {
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            padding: 25px 15px;
            cursor: pointer;
            transition: opacity 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .side-btn:hover { opacity: 0.85; }
        
        /* 綠色功能按鈕 */
        .btn-green { background-color: #347b38; }
        /* 藍色功能按鈕 */
        .btn-blue { background-color: #0080c5; }

        /* 底部除錯與結果資訊區塊 */
        .info-box {
            width: 800px;
            margin: 0 auto 20px auto;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: left;
        }
        .info-box h3 {
            margin-top: 0; color: #34495e; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }
        pre {
            background-color: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 5px;
            overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; max-height: 300px; overflow-y: auto;
            display: none;
        }
        .small-btn {
            background-color: #7f8c8d; color: white; border: none; font-size: 14px; padding: 6px 12px; border-radius: 4px; cursor: pointer;
        }
        .small-btn:hover { background-color: #95a5a6; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>智慧郊野公園垃圾桶</h1>
        <button id="connectSerialBtn">◀ 連接 Micro:bit</button>
    </div>

    <div class="main-display">
        
        <div class="left-panel">
            <div id="camera-container">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="overlay"></canvas>
            </div>
            <button id="toggleBtn">▶ 開始辨認</button>
        </div>

        <div class="side-panel">
            <div id="qrStatusBox" class="qr-status">
                是否偵測到QR code：無
            </div>
            
            <button id="openBinBtn" class="side-btn btn-green">開啟垃圾桶及<br>存取積分</button>
            <button class="side-btn btn-blue" onclick="alert('現在位置及相鄰垃圾桶功能建置中...')">現在位置及<br>相鄰垃圾桶</button>
        </div>
    </div>

    <div class="info-box">
        <h3>辨識結果</h3>
        <div id="text-results">等待辨認中...</div>
    </div>

    <div class="info-box">
        <h3>網站回傳資訊 (Raw JSON) <button id="toggleJsonBtn" class="small-btn">展開資訊</button></h3>
        <pre id="raw-json">尚無資料</pre>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const connectSerialBtn = document.getElementById('connectSerialBtn');
        const textResults = document.getElementById('text-results');
        const rawJson = document.getElementById('raw-json');
        const qrStatusBox = document.getElementById('qrStatusBox');
        
        // 🌟 按鈕綁定
        const openBinBtn = document.getElementById('openBinBtn');
        
        // Google Apps Script URL
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwjSH4IHmhBsC8HYax3K4MvyPN3JWhZ71uxQMpIzmXMVZGqgU-9EO_k2TFZec3ZSTi1/exec";

        const toggleJsonBtn = document.getElementById('toggleJsonBtn');
        toggleJsonBtn.addEventListener('click', () => {
            if (rawJson.style.display === 'none' || rawJson.style.display === '') {
                rawJson.style.display = 'block'; toggleJsonBtn.innerText = '收起資訊';
            } else {
                rawJson.style.display = 'none'; toggleJsonBtn.innerText = '展開資訊';
            }
        });

        let isDetecting = false;
        let serialPort = null;
        let serialWriter = null;
        let lastDetectionSendTime = 0; // 🌟 改名為通用偵測時間
        let lastQRSendTime = 0;

        const API_KEY = 's1Lu70khq7Ymo6iCuiFw';
        const API_URL = 'https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/custom-workflow-2';

        connectSerialBtn.addEventListener('click', async () => {
            if (!('serial' in navigator)) { alert("瀏覽器不支援 Web Serial API"); return; }
            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 115200 });
                const textEncoder = new TextEncoderStream();
                textEncoder.readable.pipeTo(serialPort.writable);
                serialWriter = textEncoder.writable.getWriter();
                connectSerialBtn.innerText = "Micro:bit 已連接 ✅";
                connectSerialBtn.disabled = true;
                connectSerialBtn.style.backgroundColor = "#27ae60";
            } catch (error) { console.error("連接序列埠失敗:", error); }
        });

        async function sendToMicrobit(text) {
            if (serialWriter) {
                try { await serialWriter.write(text + "\n"); } catch (error) { console.error("寫入 Micro:bit 失敗:", error); }
            } else {
                console.log(`(模擬) 未連接 Micro:bit，但嘗試發送訊號：${text}`);
            }
        }

        // 🌟 點擊「開啟垃圾桶及存取積分」發送 Result1
        openBinBtn.addEventListener('click', () => {
            sendToMicrobit("Result1");
            alert("已發送指令 (Result1) 至 Micro:bit！");
        });

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; };
            } catch (error) { alert("無法存取攝影機。"); }
        }

        function getFrameImageData() {
            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = video.videoWidth; hiddenCanvas.height = video.videoHeight;
            const hiddenCtx = hiddenCanvas.getContext('2d');
            hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            return hiddenCtx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
        }

        function sendToGoogleSheet() {
            if (!GOOGLE_SHEET_API_URL) return;

            const now = new Date();
            const dateStr = now.getFullYear() + '/' + String(now.getMonth() + 1).padStart(2, '0') + '/' + String(now.getDate()).padStart(2, '0');
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');

            const payload = {
                user: "Cherry",
                date: dateStr,
                time: timeStr,
                points: "500",
                shop: "賺取積分",
                item: "賺取積分"
            };

            fetch(GOOGLE_SHEET_API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log("QR Code 資料已送出至 Google Sheet！");
            }).catch(error => {
                console.error("寫入表格失敗:", error);
            });
        }

        function checkQRCode() {
            if (!isDetecting || video.videoWidth === 0) return;
            
            const imageData = getFrameImageData();
            const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

            if (code) {
                qrStatusBox.classList.add("detected");
                const currentTime = Date.now();
                
                if (currentTime - lastQRSendTime >= 10000) {
                    sendToGoogleSheet();
                    lastQRSendTime = currentTime;
                    qrStatusBox.innerHTML = "是否偵測到QR code：有 ✅<br><span style='color:#e74c3c; font-size:13px;'>(資料已傳送！)</span>";
                } else {
                    const remainTime = Math.ceil((10000 - (currentTime - lastQRSendTime)) / 1000);
                    qrStatusBox.innerHTML = `是否偵測到QR code：有 ✅<br><span style='color:#7f8c8d; font-size:13px;'>(等待 ${remainTime} 秒後才能發送)</span>`;
                }
            } else {
                qrStatusBox.innerHTML = "是否偵測到QR code：無";
                qrStatusBox.classList.remove("detected");
            }
        }

        async function detect() {
            if (!isDetecting) return;

            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = video.videoWidth; hiddenCanvas.height = video.videoHeight;
            const hiddenCtx = hiddenCanvas.getContext('2d');
            hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            const base64Image = hiddenCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: API_KEY, inputs: { "image": { "type": "base64", "value": base64Image } } })
                });
                const result = await response.json();
                rawJson.innerText = JSON.stringify(result, null, 2);
                processResults(result);
            } catch (error) {
                console.error("API 請求失敗:", error);
            }

            if (isDetecting) { setTimeout(detect, 500); }
        }

        function processResults(result) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let resultText = ""; let predictions = [];

            if (result && result.outputs && result.outputs.length > 0) {
                const firstOutput = result.outputs[0];
                if (firstOutput.predictions && firstOutput.predictions.predictions) predictions = firstOutput.predictions.predictions;
            }

            if (predictions.length === 0) { textResults.innerHTML = "未偵測到物體"; return; }
            let hasValidDetection = false;

            predictions.forEach(pred => {
                const label = pred.class || "Unknown";
                // 🌟 門檻統一降至 0.5 (50%)
                const threshold = 0.5;

                if (pred.confidence > threshold) {
                    if (pred.x !== undefined && pred.y !== undefined && pred.width && pred.height) {
                        hasValidDetection = true;
                        const x = pred.x - pred.width / 2; const y = pred.y - pred.height / 2;
                        const confidencePercent = (pred.confidence * 100).toFixed(1) + "%";

                        ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 3; ctx.strokeRect(x, y, pred.width, pred.height);
                        ctx.fillStyle = "#2ecc71"; const textWidth = ctx.measureText(`${label} ${confidencePercent}`).width;
                        ctx.fillRect(x, y - 25, textWidth + 10, 25);
                        ctx.fillStyle = "#ffffff"; ctx.font = "16px Arial"; ctx.fillText(`${label} ${confidencePercent}`, x + 5, y - 7);

                        // 🌟 只要偵測到結果 (大於0.5)，就發送 Result2
                        const currentTime = Date.now();
                        if (currentTime - lastDetectionSendTime >= 10000) {
                            sendToMicrobit("Result2"); 
                            lastDetectionSendTime = currentTime; 
                            resultText += `<li><strong>${label}</strong> - 信心度: ${confidencePercent} <span style="color: red;">(已發送 Result2 訊號!)</span></li>`;
                        } else {
                            const remainTime = Math.ceil((10000 - (currentTime - lastDetectionSendTime)) / 1000);
                            resultText += `<li><strong>${label}</strong> - 信心度: ${confidencePercent} <span style="color: gray;">(冷卻中... ${remainTime} 秒)</span></li>`;
                        }
                    }
                }
            });
            if (hasValidDetection) textResults.innerHTML = `<ul>${resultText}</ul>`;
            else textResults.innerHTML = "未偵測到符合門檻 (大於 50%) 的物體";
        }

        let qrScanInterval;
        
        toggleBtn.addEventListener('click', () => {
            isDetecting = !isDetecting;
            if (isDetecting) {
                toggleBtn.innerHTML = "⏹ 停止辨認"; toggleBtn.classList.add("stop");
                textResults.innerHTML = "偵測中...";
                detect(); 
                qrScanInterval = setInterval(checkQRCode, 200);
            } else {
                toggleBtn.innerHTML = "▶ 開始辨認"; toggleBtn.classList.remove("stop");
                textResults.innerHTML = "已停止偵測";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                clearInterval(qrScanInterval);
                qrStatusBox.innerHTML = "是否偵測到QR code：無";
                qrStatusBox.classList.remove("detected");
            }
        });

        setupCamera();

    </script>
</body>
</html>
