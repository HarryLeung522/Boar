<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郊野公園智能垃圾桶</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        #controls {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        button {
            padding: 10px 24px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 200px;
        }
        /* Micro:bit 按鈕樣式 */
        #connectSerialBtn {
            background-color: #3498db;
        }
        #connectSerialBtn:hover {
            background-color: #2980b9;
        }
        #connectSerialBtn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        /* 辨認按鈕樣式 */
        #toggleBtn {
            background-color: #27ae60;
        }
        #toggleBtn:hover {
            background-color: #2ecc71;
        }
        #toggleBtn.stop {
            background-color: #c0392b;
        }
        #toggleBtn.stop:hover {
            background-color: #e74c3c;
        }
        #camera-container {
            position: relative;
            display: inline-block;
            margin: 0 auto;
            border: 4px solid #bdc3c7;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        video {
            display: block;
            width: 640px;
            height: 480px;
            object-fit: cover;
        }
        /* Canvas 絕對定位在 Video 上方用來畫框 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            pointer-events: none;
        }
        .info-box {
            width: 640px;
            margin: 20px auto;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: left;
        }
        .info-box h3 {
            margin-top: 0;
            color: #34495e;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
        }
        pre {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>郊野公園智能垃圾桶</h1>

    <div id="controls">
        <button id="connectSerialBtn">連接 Micro:bit</button>
        <button id="toggleBtn">開始辨認</button>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="info-box">
        <h3>辨識結果</h3>
        <div id="text-results">等待辨認中...</div>
    </div>

    <div class="info-box">
        <h3>網站回傳資訊 (Raw JSON)</h3>
        <pre id="raw-json">尚無資料</pre>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const connectSerialBtn = document.getElementById('connectSerialBtn');
        const textResults = document.getElementById('text-results');
        const rawJson = document.getElementById('raw-json');

        let isDetecting = false;
        
        // Web Serial 變數
        let serialPort = null;
        let serialWriter = null;

        // 設定 Roboflow API 資訊
        const API_KEY = 's1Lu70khq7Ymo6iCuiFw';
        const API_URL = 'https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/custom-workflow-2';

        // 0. Micro:bit 序列埠連接邏輯
        connectSerialBtn.addEventListener('click', async () => {
            if (!('serial' in navigator)) {
                alert("你的瀏覽器不支援 Web Serial API。請使用最新版的 Chrome 或 Edge 瀏覽器！");
                return;
            }

            try {
                // 要求使用者選擇序列埠 (Micro:bit)
                serialPort = await navigator.serial.requestPort();
                
                // 開啟序列埠，Micro:bit 預設 Baud Rate 為 115200
                await serialPort.open({ baudRate: 115200 });
                
                // 設定寫入串流
                const textEncoder = new TextEncoderStream();
                const writableStreamClosed = textEncoder.readable.pipeTo(serialPort.writable);
                serialWriter = textEncoder.writable.getWriter();

                // 更新按鈕狀態
                connectSerialBtn.innerText = "Micro:bit 已連接 ✅";
                connectSerialBtn.disabled = true;
                connectSerialBtn.style.backgroundColor = "#27ae60";
                
                alert("成功連接 Micro:bit！");
            } catch (error) {
                console.error("連接序列埠失敗:", error);
                alert("連接失敗或使用者取消：" + error.message);
            }
        });

        // 發送文字到 Micro:bit 的通用函數
        async function sendToMicrobit(text) {
            if (serialWriter) {
                try {
                    // 加上 \n (換行符號)，讓 Micro:bit 的 "serial read until new line" 可以正常運作
                    await serialWriter.write(text + "\n");
                    console.log(`已發送至 Micro:bit: ${text}`);
                } catch (error) {
                    console.error("寫入 Micro:bit 失敗:", error);
                }
            }
        }

        // 1. 初始化攝影機
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 }
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
            } catch (error) {
                console.error("無法存取攝影機:", error);
                alert("無法存取攝影機，請確認已授權瀏覽器使用鏡頭。");
            }
        }

        // 2. 擷取畫面並轉為 Base64
        function getFrameBase64() {
            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            const hiddenCtx = hiddenCanvas.getContext('2d');
            hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            const dataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.8);
            return dataUrl.split(',')[1]; 
        }

        // 3. 執行辨識 (呼叫 API)
        async function detect() {
            if (!isDetecting) return;

            const base64Image = getFrameBase64();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: API_KEY,
                        inputs: { 
                            "image": { "type": "base64", "value": base64Image } 
                        }
                    })
                });

                const result = await response.json();
                rawJson.innerText = JSON.stringify(result, null, 2);
                processResults(result);

            } catch (error) {
                console.error("API 請求失敗:", error);
                rawJson.innerText = "Error: " + error.message;
            }

            if (isDetecting) {
                setTimeout(detect, 500);
            }
        }

        // 4. 解析結果與畫框
        function processResults(result) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let resultText = "";
            let predictions = [];

            if (result && result.outputs && result.outputs.length > 0) {
                const firstOutput = result.outputs[0];
                if (firstOutput.predictions && firstOutput.predictions.predictions) {
                    predictions = firstOutput.predictions.predictions;
                }
            }

            if (predictions.length === 0) {
                textResults.innerHTML = "未偵測到物體";
                return;
            }

            let hasValidDetection = false;

            predictions.forEach(pred => {
                const label = pred.class || "Unknown";
                const threshold = (label === "boar") ? 0.8 : 0.6;

                if (pred.confidence > threshold) {
                    if (pred.x !== undefined && pred.y !== undefined && pred.width && pred.height) {
                        
                        hasValidDetection = true;

                        const x = pred.x - pred.width / 2;
                        const y = pred.y - pred.height / 2;
                        const confidencePercent = (pred.confidence * 100).toFixed(1) + "%";

                        ctx.strokeStyle = "#2ecc71";
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, y, pred.width, pred.height);

                        ctx.fillStyle = "#2ecc71";
                        const textWidth = ctx.measureText(`${label} ${confidencePercent}`).width;
                        ctx.fillRect(x, y - 25, textWidth + 10, 25);

                        ctx.fillStyle = "#ffffff";
                        ctx.font = "16px Arial";
                        ctx.fillText(`${label} ${confidencePercent}`, x + 5, y - 7);

                        resultText += `<li><strong>${label}</strong> - 信心度: ${confidencePercent}</li>`;

                        // 🌟 這裡呼叫 Micro:bit 通訊！如果辨識到野豬，就傳送 "boar"
                        if (label === "boar") {
                            sendToMicrobit("boar");
                        }
                    }
                }
            });

            if (hasValidDetection) {
                textResults.innerHTML = `<ul>${resultText}</ul>`;
            } else {
                textResults.innerHTML = "未偵測到符合信心度門檻的物體（例如 boar 需 > 80%）";
            }
        }

        // 5. 按鈕控制
        toggleBtn.addEventListener('click', () => {
            isDetecting = !isDetecting;
            
            if (isDetecting) {
                toggleBtn.innerText = "停止辨認";
                toggleBtn.classList.add("stop");
                textResults.innerHTML = "偵測中...";
                detect();
            } else {
                toggleBtn.innerText = "開始辨認";
                toggleBtn.classList.remove("stop");
                textResults.innerHTML = "已停止偵測";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        setupCamera();

    </script>
</body>
</html>
