<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郊野公園智能垃圾桶</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        #controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 24px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2ecc71;
        }
        button.stop {
            background-color: #c0392b;
        }
        button.stop:hover {
            background-color: #e74c3c;
        }
        #camera-container {
            position: relative;
            display: inline-block;
            margin: 0 auto;
            border: 4px solid #bdc3c7;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        video {
            display: block;
            width: 640px;
            height: 480px;
            object-fit: cover;
        }
        /* Canvas 絕對定位在 Video 上方用來畫框 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            pointer-events: none;
        }
        .info-box {
            width: 640px;
            margin: 20px auto;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: left;
        }
        .info-box h3 {
            margin-top: 0;
            color: #34495e;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
        }
        pre {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>郊野公園智能垃圾桶</h1>

    <div id="controls">
        <button id="toggleBtn">開始辨認</button>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="info-box">
        <h3>辨識結果</h3>
        <div id="text-results">等待辨認中...</div>
    </div>

    <div class="info-box">
        <h3>網站回傳資訊 (Raw JSON)</h3>
        <pre id="raw-json">尚無資料</pre>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const textResults = document.getElementById('text-results');
        const rawJson = document.getElementById('raw-json');

        let isDetecting = false;
        let detectionInterval;

        // 設定 Roboflow API 資訊
        const API_KEY = 's1Lu70khq7Ymo6iCuiFw';
        const API_URL = 'https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/custom-workflow-2';

        // 1. 初始化攝影機
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 }
                });
                video.srcObject = stream;
                
                // 等待影片讀取完成，以設定正確的 canvas 大小
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
            } catch (error) {
                console.error("無法存取攝影機:", error);
                alert("無法存取攝影機，請確認已授權瀏覽器使用鏡頭。");
            }
        }

        // 2. 擷取畫面並轉為 Base64
        function getFrameBase64() {
            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            const hiddenCtx = hiddenCanvas.getContext('2d');
            hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            // 轉為 base64 字串，並移除 data:image/jpeg;base64, 前綴
            const dataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.8);
            return dataUrl.split(',')[1]; 
        }

        // 3. 執行辨識 (呼叫 API)
        async function detect() {
            if (!isDetecting) return;

            const base64Image = getFrameBase64();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: API_KEY,
                        inputs: { 
                            // API 接受 base64 格式以支援鏡頭實時畫面
                            "image": { "type": "base64", "value": base64Image } 
                        }
                    })
                });

                const result = await response.json();
                
                // 顯示 Raw JSON
                rawJson.innerText = JSON.stringify(result, null, 2);

                // 處理並繪製結果
                processResults(result);

            } catch (error) {
                console.error("API 請求失敗:", error);
                rawJson.innerText = "Error: " + error.message;
            }

            // 繼續下一次辨識，設定 500 毫秒延遲避免超出 API 速率限制
            if (isDetecting) {
                setTimeout(detect, 500);
            }
        }

        // 4. 解析結果與畫框
        function processResults(result) {
            // 清除上一幀的畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let resultText = "";
            let predictions = [];

            // 🌟 抓取深層的 predictions 陣列
            if (result && result.outputs && result.outputs.length > 0) {
                const firstOutput = result.outputs[0];
                if (firstOutput.predictions && firstOutput.predictions.predictions) {
                    predictions = firstOutput.predictions.predictions;
                }
            }

            if (predictions.length === 0) {
                textResults.innerHTML = "未偵測到物體";
                return;
            }

            let hasValidDetection = false;

            // 繪製每個預測結果
            predictions.forEach(pred => {
                // 🛑 新增過濾條件：信心度必須大於 0.6 (60%) 才會進行標示
                if (pred.confidence > 0.6) {
                    
                    // 確認預測資料是否有座標與長寬
                    if (pred.x !== undefined && pred.y !== undefined && pred.width && pred.height) {
                        
                        hasValidDetection = true;

                        // Roboflow 給的是中心點 (x,y)，需要轉換成左上角座標來畫框
                        const x = pred.x - pred.width / 2;
                        const y = pred.y - pred.height / 2;
                        const confidencePercent = (pred.confidence * 100).toFixed(1) + "%";
                        const label = pred.class || "Unknown";

                        // 畫綠色方框
                        ctx.strokeStyle = "#2ecc71"; // 綠色
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, y, pred.width, pred.height);

                        // 畫標籤背景
                        ctx.fillStyle = "#2ecc71";
                        const textWidth = ctx.measureText(`${label} ${confidencePercent}`).width;
                        ctx.fillRect(x, y - 25, textWidth + 10, 25);

                        // 寫入標籤與信心度 (%)
                        ctx.fillStyle = "#ffffff";
                        ctx.font = "16px Arial";
                        ctx.fillText(`${label} ${confidencePercent}`, x + 5, y - 7);

                        // 組合下方文字結果
                        resultText += `<li><strong>${label}</strong> - 信心度: ${confidencePercent}</li>`;
                    }
                }
            });

            // 根據是否有符合條件的物體來更新文字
            if (hasValidDetection) {
                textResults.innerHTML = `<ul>${resultText}</ul>`;
            } else {
                textResults.innerHTML = "未偵測到信心度超過 60% 的物體";
            }
        }

        // 5. 按鈕控制
        toggleBtn.addEventListener('click', () => {
            isDetecting = !isDetecting;
            
            if (isDetecting) {
                toggleBtn.innerText = "停止辨認";
                toggleBtn.classList.add("stop");
                textResults.innerHTML = "偵測中...";
                detect(); // 開始迴圈
            } else {
                toggleBtn.innerText = "開始辨認";
                toggleBtn.classList.remove("stop");
                textResults.innerHTML = "已停止偵測";
                ctx.clearRect(0, 0, canvas.width, canvas.height); // 清除畫面上的框
            }
        });

        // 啟動頁面時先開啟鏡頭
        setupCamera();

    </script>
</body>
</html>
