<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郊野公園智能垃圾桶</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        
        /* 頂部控制列 */
        #controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        button {
            padding: 10px 24px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        /* 各種按鈕的顏色設定 */
        #connectSerialBtn { background-color: #3498db; }
        #connectSerialBtn:hover { background-color: #2980b9; }
        #connectSerialBtn:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        #toggleBtn { background-color: #27ae60; }
        #toggleBtn:hover { background-color: #2ecc71; }
        #toggleBtn.stop { background-color: #c0392b; }
        #toggleBtn.stop:hover { background-color: #e74c3c; }

        .side-btn { background-color: #f39c12; width: 240px; font-size: 16px; padding: 15px 20px; }
        .side-btn:hover { background-color: #e67e22; }

        .small-btn { background-color: #7f8c8d; font-size: 14px; padding: 6px 12px; margin-bottom: 10px; }
        .small-btn:hover { background-color: #95a5a6; }

        /* 主畫面佈局 (鏡頭 + 右側按鈕) */
        .main-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        /* 鏡頭區塊 */
        #camera-container {
            position: relative;
            display: inline-block;
            border: 4px solid #bdc3c7;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        video {
            display: block;
            width: 640px;
            height: 480px;
            object-fit: cover;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            pointer-events: none;
        }

        /* 右側按鈕面板 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 資訊區塊 */
        .info-box {
            width: 640px;
            margin: 0 auto 20px auto;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: left;
        }
        .info-box h3 {
            margin-top: 0;
            color: #34495e;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        pre {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
            display: none; /* 預設隱藏 JSON */
        }
    </style>
</head>
<body>

    <h1>郊野公園智能垃圾桶</h1>

    <div id="controls">
        <button id="connectSerialBtn">連接 Micro:bit</button>
        <button id="toggleBtn">開始辨認</button>
    </div>

    <div class="main-display">
        <div id="camera-container">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="side-panel">
            <button class="side-btn" onclick="alert('開啟垃圾桶及存取積分功能建置中...')">開啟垃圾桶及存取積分</button>
            <button class="side-btn" onclick="alert('現在位置及相鄰垃圾桶功能建置中...')">現在位置及相鄰垃圾桶</button>
        </div>
    </div>

    <div class="info-box">
        <h3>辨識結果</h3>
        <div id="text-results">等待辨認中...</div>
    </div>

    <div class="info-box">
        <h3>
            網站回傳資訊 (Raw JSON)
            <button id="toggleJsonBtn" class="small-btn">展開資訊</button>
        </h3>
        <pre id="raw-json">尚無資料</pre>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const connectSerialBtn = document.getElementById('connectSerialBtn');
        const textResults = document.getElementById('text-results');
        const rawJson = document.getElementById('raw-json');
        
        // 🌟 新增的 JSON 開關邏輯
        const toggleJsonBtn = document.getElementById('toggleJsonBtn');
        toggleJsonBtn.addEventListener('click', () => {
            if (rawJson.style.display === 'none' || rawJson.style.display === '') {
                rawJson.style.display = 'block';
                toggleJsonBtn.innerText = '收起資訊';
            } else {
                rawJson.style.display = 'none';
                toggleJsonBtn.innerText = '展開資訊';
            }
        });

        let isDetecting = false;
        
        // Web Serial 變數
        let serialPort = null;
        let serialWriter = null;

        // 用來記錄上一次發送 boar 的時間
        let lastBoarSendTime = 0; 

        // 設定 Roboflow API 資訊
        const API_KEY = 's1Lu70khq7Ymo6iCuiFw';
        const API_URL = 'https://serverless.roboflow.com/harrys-workspace-wrtc8/workflows/custom-workflow-2';

        // 0. Micro:bit 序列埠連接邏輯
        connectSerialBtn.addEventListener('click', async () => {
            if (!('serial' in navigator)) {
                alert("你的瀏覽器不支援 Web Serial API。請使用最新版的 Chrome 或 Edge 瀏覽器！");
                return;
            }

            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 115200 });
                
                const textEncoder = new TextEncoderStream();
                const writableStreamClosed = textEncoder.readable.pipeTo(serialPort.writable);
                serialWriter = textEncoder.writable.getWriter();

                connectSerialBtn.innerText = "Micro:bit 已連接 ✅";
                connectSerialBtn.disabled = true;
                connectSerialBtn.style.backgroundColor = "#27ae60";
                
                alert("成功連接 Micro:bit！");
            } catch (error) {
                console.error("連接序列埠失敗:", error);
                alert("連接失敗或使用者取消：" + error.message);
            }
        });

        // 發送文字到 Micro:bit
        async function sendToMicrobit(text) {
            if (serialWriter) {
                try {
                    await serialWriter.write(text + "\n");
                    console.log(`已發送至 Micro:bit: ${text}`);
                } catch (error) {
                    console.error("寫入 Micro:bit 失敗:", error);
                }
            }
        }

        // 1. 初始化攝影機
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 }
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
            } catch (error) {
                console.error("無法存取攝影機:", error);
                alert("無法存取攝影機，請確認已授權瀏覽器使用鏡頭。");
            }
        }

        // 2. 擷取畫面並轉為 Base64
        function getFrameBase64() {
            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            const hiddenCtx = hiddenCanvas.getContext('2d');
            hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            const dataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.8);
            return dataUrl.split(',')[1]; 
        }

        // 3. 執行辨識 (呼叫 API)
        async function detect() {
            if (!isDetecting) return;

            const base64Image = getFrameBase64();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: API_KEY,
                        inputs: { 
                            "image": { "type": "base64", "value": base64Image } 
                        }
                    })
                });

                const result = await response.json();
                rawJson.innerText = JSON.stringify(result, null, 2);
                processResults(result);

            } catch (error) {
                console.error("API 請求失敗:", error);
                rawJson.innerText = "Error: " + error.message;
            }

            if (isDetecting) {
                setTimeout(detect, 500);
            }
        }

        // 4. 解析結果與畫框
        function processResults(result) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let resultText = "";
            let predictions = [];

            if (result && result.outputs && result.outputs.length > 0) {
                const firstOutput = result.outputs[0];
                if (firstOutput.predictions && firstOutput.predictions.predictions) {
                    predictions = firstOutput.predictions.predictions;
                }
            }

            if (predictions.length === 0) {
                textResults.innerHTML = "未偵測到物體";
                return;
            }

            let hasValidDetection = false;

            predictions.forEach(pred => {
                const label = pred.class || "Unknown";
                const threshold = (label === "boar") ? 0.8 : 0.6;

                if (pred.confidence > threshold) {
                    if (pred.x !== undefined && pred.y !== undefined && pred.width && pred.height) {
                        
                        hasValidDetection = true;

                        const x = pred.x - pred.width / 2;
                        const y = pred.y - pred.height / 2;
                        const confidencePercent = (pred.confidence * 100).toFixed(1) + "%";

                        ctx.strokeStyle = "#2ecc71";
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, y, pred.width, pred.height);

                        ctx.fillStyle = "#2ecc71";
                        const textWidth = ctx.measureText(`${label} ${confidencePercent}`).width;
                        ctx.fillRect(x, y - 25, textWidth + 10, 25);

                        ctx.fillStyle = "#ffffff";
                        ctx.font = "16px Arial";
                        ctx.fillText(`${label} ${confidencePercent}`, x + 5, y - 7);

                        // 加入冷卻時間邏輯
                        if (label === "boar") {
                            const currentTime = Date.now();
                            if (currentTime - lastBoarSendTime >= 10000) {
                                sendToMicrobit("boar");
                                lastBoarSendTime = currentTime; 
                                resultText += `<li><strong>${label}</strong> - 信心度: ${confidencePercent} <span style="color: red;">(已發送訊號至 Micro:bit!)</span></li>`;
                            } else {
                                const remainTime = Math.ceil((10000 - (currentTime - lastBoarSendTime)) / 1000);
                                resultText += `<li><strong>${label}</strong> - 信心度: ${confidencePercent} <span style="color: gray;">(訊號冷卻中... 剩餘 ${remainTime} 秒)</span></li>`;
                            }
                        } else {
                            resultText += `<li><strong>${label}</strong> - 信心度: ${confidencePercent}</li>`;
                        }
                    }
                }
            });

            if (hasValidDetection) {
                textResults.innerHTML = `<ul>${resultText}</ul>`;
            } else {
                textResults.innerHTML = "未偵測到符合信心度門檻的物體（例如 boar 需 > 80%）";
            }
        }

        // 5. 按鈕控制
        toggleBtn.addEventListener('click', () => {
            isDetecting = !isDetecting;
            
            if (isDetecting) {
                toggleBtn.innerText = "停止辨認";
                toggleBtn.classList.add("stop");
                textResults.innerHTML = "偵測中...";
                detect();
            } else {
                toggleBtn.innerText = "開始辨認";
                toggleBtn.classList.remove("stop");
                textResults.innerHTML = "已停止偵測";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        setupCamera();

    </script>
</body>
</html>
